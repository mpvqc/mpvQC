name: Install libmpv
description: Installs libmpv - via apt on Linux, or by downloading and extracting on Windows

inputs:
  url:
    description: URL to download libmpv from (Windows only)
    default: https://github.com/shinchiro/mpv-winbuild-cmake/releases/download/20260610/mpv-dev-x86_64-20260610-git-304426c.7z
  sha256:
    description: Expected SHA256 checksum (Windows only)
    default: 8cbb25ea784f01afbb3f904217cab1317430a8bcfd5680fd827a866367f71cc9

runs:
  using: composite
  steps:
    - name: Install libmpv
      shell: bash
      run: |
        if [[ "$RUNNER_OS" == "Linux" ]]; then
          sudo apt update -y
          sudo apt install -y libegl1 libmpv2
        elif [[ "$RUNNER_OS" == "Windows" ]]; then
          ARTIFACT="$(basename "${{ inputs.url }}")"
          curl -L -O "${{ inputs.url }}"
          echo -n "${{ inputs.sha256 }} $ARTIFACT" > "$ARTIFACT.sha256"
          sha256sum --check "$ARTIFACT.sha256"
          7z x "$ARTIFACT"
        else
          echo "Unsupported runner OS: $RUNNER_OS" >&2
          exit 1
        fi
